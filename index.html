<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhân Sự Ban</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="main-container">
        <h1>Chào mừng bạn đến với Nhân Sự Ban</h1>
        <button id="first-arrow">→</button>
        <div id="map-section" class="hidden">
            <!-- Hình ảnh bản đồ Việt Nam kèm cờ -->
            <img src="./VietNam.jpg" alt="Bản đồ Việt Nam" id="vietnam-map">
            <p>Hoàng Sa, Trường Sa là của Việt Nam</p>
            <button id="second-arrow" class="hidden">→</button>
        </div>
        <div id="invitation-section" class="hidden">
            <!-- Hình ảnh thiệp mời -->
            <img src="./thumoine.png" alt="Thiệp mời Nhân Sự Ban">
            <!-- Hiệu ứng ngôi sao lấp lánh -->
            <div class="sparkle" style="top: 10%; left: 10%;"></div>
            <div class="sparkle" style="top: 20%; left: 80%;"></div>
            <div class="sparkle" style="top: 80%; left: 20%;"></div>
            <div class="sparkle" style="top: 90%; left: 90%;"></div>
            <div class="particles"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
